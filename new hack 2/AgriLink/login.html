<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriLink</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <h1>🌱 AgriLink</h1>
            </div>
            <div class="nav-links">
                <a href="marketplace.html" class="btn btn-secondary">Marketplace</a>
            </div>
        </nav>
    </header>

    <main class="container" style="max-width:450px; margin-top:3rem;">
        <div class="card" style="padding:2.5rem;">
            <h2 style="text-align:center;color:#2d5016;margin-bottom:2rem;">Simple Login</h2>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" value="buyer" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" value="123" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role" required>
                        <option value="">Select</option>
                        <option value="buyer">Buyer</option>
                        <option value="farmer">Farmer</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;padding:1rem;">Login</button>
            </form>

            <div style="text-align:center;margin-top:1.5rem;color:#666;">
                
            </div>
        </div>
    </main>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const role = document.getElementById('role').value;
            if (role === 'buyer') {
                localStorage.setItem('agrilink_currentUser', JSON.stringify({role: 'buyer', id: 'buyer1'}));
                window.location.href = 'buyer.html';
            } else if (role === 'farmer') {
                localStorage.setItem('agrilink_currentUser', JSON.stringify({role: 'farmer', id: 'farmer1'}));
                window.location.href = 'farmer.html';
            }
        });
    </script>
</body>
</html>
