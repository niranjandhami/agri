<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Dashboard - AgriLink</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <h1>🌱 AgriLink Farmer</h1>
            </div>
            <div class="nav-links">
                <a href="marketplace.html" class="btn btn-secondary">Marketplace</a>
                <a href="index.html" class="btn btn-secondary logout-btn">Logout</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="products-count">0</h3>
                    <p>Total Products</p>
                </div>
                <div class="stat-card">
                    <h3 id="orders-count">0</h3>
                    <p>Received Orders</p>
                </div>
            </div>

            <div class="card">
                <h3>Add New Product</h3>
                <form id="add-product-form">
                    <div class="form-group">
                        <label for="product-name">Product Name</label>
                        <input type="text" id="product-name" required>
                    </div>
                    <div class="form-group">
                        <label for="product-price">Price ($)</label>
                        <input type="number" id="product-price" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="product-quantity">Quantity</label>
                        <input type="number" id="product-quantity" required>
                    </div>
                    <div class="form-group">
                        <label for="product-category">Category</label>
                        <select id="product-category" required>
                            <option value="">Select Category</option>
                            <option value="Vegetables">Vegetables</option>
                            <option value="Fruits">Fruits</option>
                            <option value="Grains">Grains</option>
                            <option value="Dairy">Dairy</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Product</button>
                </form>
            </div>

            <div class="card">
                <h3>My Products</h3>
                <div id="product-list"></div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/products.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
