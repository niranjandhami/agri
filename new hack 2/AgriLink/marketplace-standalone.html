<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - AgriLink (No Login Required)</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <h1>🌱 AgriLink Marketplace</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="btn btn-secondary">Home</a>
                <a href="login.html" class="btn btn-secondary">Login</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Search products (Vegetables, Fruits...)">
        </div>

        <div class="products-grid" id="marketplace-products">
            <div style="text-align:center;padding:4rem;color:#666;">
                Loading products... 🌱
            </div>
        </div>
    </main>

    <script>
        // Inline seed data + render (no dependencies)
        function seedAndRender() {
            // Sample products
            const products = [
                {id: '1', name: 'Organic Tomatoes', price: 2.99, quantity: 50, category: 'Vegetables'},
                {id: '2', name: 'Fresh Apples', price: 1.49, quantity: 100, category: 'Fruits'},
                {id: '3', name: 'Brown Rice', price: 4.99, quantity: 25, category: 'Grains'},
                {id: '4', name: 'Fresh Milk', price: 3.25, quantity: 30, category: 'Dairy'}
            ];

            const searchInput = document.getElementById('search-input');
            const container = document.getElementById('marketplace-products');

            function renderProducts(query = '') {
                const filtered = products.filter(p => 
                    p.name.toLowerCase().includes(query.toLowerCase()) || 
                    p.category.toLowerCase().includes(query.toLowerCase())
                );
                container.innerHTML = filtered.map(p => `
                    <div class="product-card" style="position:relative;">
                        <img src="${getProductImage(p.category)}" alt="${p.name}" style="width:100%;height:200px;object-fit:cover;border-radius:15px 15px 0 0;margin-bottom:1rem;">
                        <h3>${p.name}</h3>
                        <div class="product-price">$${p.price}</div>
                        <div class="product-quantity">${p.quantity} available</div>
                        <div>Category: ${p.category}</div>
                        <button onclick="alert('Login to buy: buyer@test.com / pass123')" 
                                class="btn btn-primary" style="width:100%;">Buy Now</button>
                    </div>
                `).join('') || '<p style="text-align:center;color:#666;padding:4rem;">No products match your search.</p>';
            }

            searchInput.addEventListener('input', (e) => renderProducts(e.target.value));
            renderProducts(); // Initial render
        }

        // Run after styles & DOM ready
        window.addEventListener('load', seedAndRender);
    </script>
</body>
</html>
